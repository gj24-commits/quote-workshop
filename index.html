<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단체 워크숍 견적서</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f7fa; color: #333; }
        .header { background: linear-gradient(135deg, #1a365d, #2d5aa0); color: white; padding: 30px 40px; }
        .header h1 { font-size: 28px; margin-bottom: 8px; }
        .header p { opacity: 0.8; font-size: 14px; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .steps { display: flex; gap: 0; margin-bottom: 30px; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .step { flex: 1; padding: 16px 20px; text-align: center; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.3s; }
        .step.active { background: #f0f7ff; border-bottom-color: #2d5aa0; color: #2d5aa0; font-weight: 600; }
        .step.completed { color: #16a34a; }
        .step-num { display: inline-block; width: 28px; height: 28px; line-height: 28px; border-radius: 50%; background: #e5e7eb; color: #666; font-size: 13px; font-weight: 700; margin-right: 8px; }
        .step.active .step-num { background: #2d5aa0; color: white; }
        .step.completed .step-num { background: #16a34a; color: white; }
        .panel { display: none; background: white; border-radius: 12px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .panel.active { display: block; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; color: #374151; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; transition: border-color 0.2s; }
        .form-group input:focus, .form-group select:focus { border-color: #2d5aa0; outline: none; box-shadow: 0 0 0 3px rgba(45,90,160,0.1); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        .region-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
        .region-card { padding: 20px; border: 2px solid #e5e7eb; border-radius: 10px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .region-card:hover { border-color: #93c5fd; background: #f0f7ff; }
        .region-card.selected { border-color: #2d5aa0; background: #eff6ff; }
        .region-card h3 { font-size: 16px; margin-bottom: 4px; }
        .accom-table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 13px; }
        .accom-table th { background: #f8fafc; padding: 12px 10px; text-align: left; border-bottom: 2px solid #e5e7eb; font-weight: 600; color: #4b5563; white-space: nowrap; }
        .accom-table td { padding: 10px; border-bottom: 1px solid #f3f4f6; vertical-align: middle; }
        .accom-table tr:hover { background: #fafbfc; }
        .accom-table .price { text-align: right; font-variant-numeric: tabular-nums; }
        .accom-table .market-price { color: #9ca3af; text-decoration: line-through; font-size: 12px; }
        .accom-table .quote-price { color: #dc2626; font-weight: 700; font-size: 15px; }
        .accom-table .discount-badge { background: #fef2f2; color: #dc2626; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .check-col { width: 40px; text-align: center; }
        .check-col input { width: 18px; height: 18px; cursor: pointer; }
        .season-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
        .season-tab { padding: 8px 20px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 500; border: 1px solid #d1d5db; background: white; transition: all 0.2s; }
        .season-tab.active { background: #2d5aa0; color: white; border-color: #2d5aa0; }
        .day-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
        .day-tab { padding: 6px 16px; border-radius: 16px; cursor: pointer; font-size: 12px; border: 1px solid #d1d5db; background: white; }
        .day-tab.active { background: #475569; color: white; border-color: #475569; }
        .discount-control { display: flex; align-items: center; gap: 16px; padding: 16px 20px; background: #fff7ed; border-radius: 10px; margin-bottom: 20px; }
        .discount-control label { font-weight: 600; white-space: nowrap; }
        .discount-control input[type="range"] { flex: 1; accent-color: #2d5aa0; }
        .discount-value { font-size: 24px; font-weight: 700; color: #dc2626; min-width: 50px; text-align: center; }
        .option-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
        .option-card { border: 1px solid #e5e7eb; border-radius: 10px; padding: 16px; cursor: pointer; transition: all 0.2s; }
        .option-card:hover { border-color: #93c5fd; }
        .option-card.selected { border-color: #2d5aa0; background: #eff6ff; }
        .option-card h4 { font-size: 14px; margin-bottom: 4px; }
        .option-card .option-price { font-size: 13px; color: #dc2626; font-weight: 600; }
        .option-card .option-tag { font-size: 11px; color: #6b7280; margin-top: 4px; }
        .option-card .option-age { font-size: 11px; color: #9ca3af; margin-top: 4px; }
        .btn-row { display: flex; justify-content: space-between; margin-top: 24px; }
        .btn { padding: 12px 28px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
        .btn-primary { background: #2d5aa0; color: white; }
        .btn-primary:hover { background: #1a365d; }
        .btn-secondary { background: #e5e7eb; color: #374151; }
        .btn-secondary:hover { background: #d1d5db; }
        .quote-preview { background: white; border: 1px solid #e5e7eb; border-radius: 12px; padding: 40px; max-width: 900px; margin: 0 auto; }
        .quote-header { text-align: center; margin-bottom: 24px; padding-bottom: 16px; }
        .quote-header h2 { font-size: 28px; color: #1a365d; letter-spacing: 12px; }
        .quote-header .quote-date { color: #6b7280; margin-top: 4px; }
        .quote-supplier { display: flex; gap: 0; margin-bottom: 24px; border: 2px solid #1a365d; border-radius: 0; }
        .quote-supplier-left { flex: 1; padding: 0; }
        .quote-supplier-left table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .quote-supplier-left table th { background: #f0f4f8; padding: 8px 12px; text-align: left; border: 1px solid #cbd5e1; color: #374151; font-weight: 600; width: 100px; white-space: nowrap; }
        .quote-supplier-left table td { padding: 8px 12px; border: 1px solid #cbd5e1; }
        .quote-supplier-seal { width: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-left: 2px solid #1a365d; padding: 12px; }
        .quote-supplier-seal img { width: 110px; height: 110px; object-fit: contain; }
        .quote-to { margin-bottom: 24px; }
        .quote-to table { width: 100%; border-collapse: collapse; font-size: 13px; border: 2px solid #1a365d; }
        .quote-to table th { background: #f0f4f8; padding: 8px 12px; text-align: left; border: 1px solid #cbd5e1; color: #374151; font-weight: 600; width: 100px; }
        .quote-to table td { padding: 8px 12px; border: 1px solid #cbd5e1; }
        .quote-amount-box { text-align: center; margin-bottom: 24px; padding: 16px; border: 2px solid #1a365d; background: #f8fafc; }
        .quote-amount-box .amount { font-size: 22px; font-weight: 700; color: #1a365d; }
        .quote-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
        .quote-info-item { padding: 12px 16px; background: #f8fafc; border-radius: 8px; }
        .quote-info-item dt { font-size: 12px; color: #6b7280; margin-bottom: 4px; }
        .quote-info-item dd { font-weight: 600; font-size: 15px; }
        .quote-table { width: 100%; border-collapse: collapse; margin-bottom: 24px; font-size: 13px; }
        .quote-table th { background: #1a365d; color: white; padding: 10px 12px; text-align: left; }
        .quote-table td { padding: 10px 12px; border-bottom: 1px solid #e5e7eb; }
        .quote-table .subtotal { font-weight: 600; background: #f8fafc; }
        .quote-total { text-align: right; padding: 20px 0; border-top: 3px solid #1a365d; }
        .quote-total .total-label { font-size: 16px; color: #6b7280; }
        .quote-total .total-amount { font-size: 28px; font-weight: 700; color: #1a365d; }
        .quote-total .discount-info { font-size: 13px; color: #dc2626; margin-top: 4px; }
        .quote-note { margin-top: 20px; padding: 16px; background: #f8fafc; border-radius: 8px; font-size: 12px; color: #6b7280; line-height: 1.8; }
        .night-input { display: flex; align-items: center; gap: 8px; }
        .night-input input { width: 80px; text-align: center; }
        .qty-input { width: 60px !important; text-align: center; }
        .market-input { width: 90px !important; text-align: right; font-size: 12px !important; padding: 4px 6px !important; border: 1px solid #d1d5db; border-radius: 4px; }
        .market-input:focus { border-color: #2d5aa0; outline: none; }
        .market-input.warn { border-color: #dc2626; background: #fef2f2; }
        @media print {
            body { background: white; }
            .header, .steps, .btn-row, .panel:not(.quote-panel) { display: none !important; }
            .panel.quote-panel { display: block !important; box-shadow: none; }
            .container { padding: 0; }
        }
        .margin-ok { color: #16a34a; font-size: 11px; }
        .margin-warn { color: #dc2626; font-size: 11px; font-weight: 700; }
        .margin-col { display: none; }
        .show-margin .margin-col { display: table-cell; }
        .admin-toggle { position: fixed; bottom: 20px; right: 20px; padding: 8px 16px; background: #1a365d; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 12px; z-index: 100; }
        .selected-items { margin-top: 16px; }
        .selected-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: #f0f7ff; border-radius: 6px; margin-bottom: 6px; font-size: 13px; }
        .selected-item .remove { color: #dc2626; cursor: pointer; font-weight: 700; }
        .empty-msg { text-align: center; padding: 40px; color: #9ca3af; }
        .market-edit-notice { background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: 13px; color: #92400e; }
    </style>
</head>
<body>

<div class="header">
    <h1>단체 워크숍 견적서 생성기</h1>
    <p>숙소 및 프로그램을 선택하고 맞춤 견적서를 생성하세요</p>
</div>

<div class="container">
    <div class="steps">
        <div class="step active" data-step="1" onclick="goToStep(1)"><span class="step-num">1</span>기본 정보</div>
        <div class="step" data-step="2" onclick="goToStep(2)"><span class="step-num">2</span>숙소 선택</div>
        <div class="step" data-step="3" onclick="goToStep(3)"><span class="step-num">3</span>옵션 선택</div>
        <div class="step" data-step="4" onclick="goToStep(4)"><span class="step-num">4</span>견적서 확인</div>
    </div>

    <!-- Step 1 -->
    <div class="panel active" id="panel-1">
        <h2 style="margin-bottom: 20px;">기본 정보 입력</h2>
        <div class="form-row">
            <div class="form-group"><label>고객사명</label><input type="text" id="clientName" placeholder="예: (주)한국기업"></div>
            <div class="form-group"><label>담당자명</label><input type="text" id="contactName" placeholder="예: 홍길동"></div>
        </div>
        <div class="form-row-3">
            <div class="form-group"><label>인원수</label><input type="number" id="numPeople" placeholder="예: 30" min="1"></div>
            <div class="form-group"><label>일정</label><input type="date" id="tripDate"></div>
            <div class="form-group"><label>숙박 일수</label><div class="night-input"><input type="number" id="numNights" value="1" min="1" max="30"><span>박</span></div></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>목적</label><select id="purpose"><option value="힐링워크숍">힐링워크숍</option><option value="교육연수">교육연수</option><option value="워케이션">워케이션</option><option value="팀빌딩">팀빌딩</option><option value="기타">기타</option></select></div>
            <div class="form-group"><label>지역 선택</label><div class="region-grid" id="regionGrid"></div></div>
        </div>
        <div class="btn-row"><div></div><button class="btn btn-primary" onclick="goToStep(2)">다음 &rarr;</button></div>
    </div>

    <!-- Step 2 -->
    <div class="panel" id="panel-2">
        <h2 style="margin-bottom: 16px;">숙소 선택</h2>
        <div class="market-edit-notice">
            <strong>시중가 편집 가능:</strong> 시중가 열의 금액을 클릭하여 실제 시중가로 수정할 수 있습니다. 할인가와 마진율이 자동으로 재계산됩니다. 마진율이 5% 미만이면 빨간색으로 경고합니다.
        </div>
        <div class="discount-control">
            <label>할인율 설정:</label>
            <input type="range" id="discountSlider" min="5" max="10" value="7" step="1" oninput="updateDiscount()">
            <div class="discount-value" id="discountValue">7%</div>
            <span style="font-size:12px;color:#92400e;">시중가 대비 할인</span>
        </div>
        <div class="season-tabs" id="seasonTabs">
            <div class="season-tab active" data-season="low" onclick="selectSeason('low')">비수기</div>
            <div class="season-tab" data-season="semi" onclick="selectSeason('semi')">준성수기</div>
            <div class="season-tab" data-season="high" onclick="selectSeason('high')">성수기</div>
        </div>
        <div class="day-tabs" id="dayTabs">
            <div class="day-tab active" data-day="weekday" onclick="selectDay('weekday')">주중</div>
            <div class="day-tab" data-day="weekend" onclick="selectDay('weekend')">주말</div>
        </div>
        <div id="accomTableWrap"></div>
        <div class="selected-items" id="selectedAccomList">
            <h3 style="margin-bottom:8px;">선택된 숙소</h3>
            <div id="selectedAccomItems"></div>
        </div>
        <div class="btn-row">
            <button class="btn btn-secondary" onclick="goToStep(1)">&larr; 이전</button>
            <button class="btn btn-primary" onclick="goToStep(3)">다음 &rarr;</button>
        </div>
    </div>

    <!-- Step 3 -->
    <div class="panel" id="panel-3">
        <h2 style="margin-bottom: 16px;">추가 옵션 선택</h2>
        <div id="optionContent"></div>
        <div class="selected-items" id="selectedOptionList" style="margin-top:20px;">
            <h3 style="margin-bottom:8px;">선택된 옵션</h3>
            <div id="selectedOptionItems"></div>
        </div>
        <div class="btn-row">
            <button class="btn btn-secondary" onclick="goToStep(2)">&larr; 이전</button>
            <button class="btn btn-primary" onclick="goToStep(4)">견적서 생성 &rarr;</button>
        </div>
    </div>

    <!-- Step 4 -->
    <div class="panel quote-panel" id="panel-4">
        <div class="btn-row" style="margin-top:0;margin-bottom:20px;">
            <button class="btn btn-secondary" onclick="goToStep(3)">&larr; 수정하기</button>
            <button class="btn btn-primary" onclick="window.print()">인쇄 / PDF 저장</button>
        </div>
        <div class="quote-preview" id="quotePreview"></div>
    </div>
</div>

<button class="admin-toggle" onclick="toggleMargin()">마진 확인</button>

<script>

// ========== STATE ==========
let currentStep = 1;
let selectedRegion = null;
let selectedSeason = 'low';
let selectedDay = 'weekday';
let selectedAccom = [];
let selectedOptions = [];
let showMargin = false;
// 사용자가 수정한 시중가를 localStorage에 저장 (key: `${index}_${costKey}`)
let customMarket = JSON.parse(localStorage.getItem('customMarket') || '{}');

const regions = [...new Set(accommodations.map(a => a.region))];
const regionLabels = { '서울': '서울', '경기도': '경기도', '경남': '경남 (통영/남해)', '경북': '경북 (경주)', '제주': '제주', '전라도': '전라도 (진안)' };

function init() {
    renderRegions();
    document.getElementById('tripDate').value = new Date().toISOString().split('T')[0];
}

function renderRegions() {
    document.getElementById('regionGrid').innerHTML = regions.map(r =>
        `<div class="region-card ${selectedRegion === r ? 'selected' : ''}" onclick="selectRegion('${r}')"><h3>${regionLabels[r] || r}</h3></div>`
    ).join('');
}

function selectRegion(r) { selectedRegion = r; selectedAccom = []; selectedOptions = []; renderRegions(); }

// 룸타입에서 인원 정보 파싱: "스탠다드 싱글(1)" -> {name:"스탠다드 싱글", capacity:"1명"}
// "수페리어 트윈(2~3)" -> {name:"수페리어 트윈", capacity:"기준 2명 / 최대 3명"}
// "독채 풀빌라(~6)" -> {name:"독채 풀빌라", capacity:"최대 6명"}
function parseRoom(room) {
    const match = room.match(/^(.+?)\(([^)]+)\)$/);
    if (!match) return { name: room, capacity: '-' };
    const name = match[1].trim();
    const cap = match[2].trim();
    if (cap.includes('~')) {
        const parts = cap.split('~');
        if (parts[0] === '') return { name, capacity: `최대 ${parts[1]}명` };
        return { name, capacity: `기준 ${parts[0]}명 / 최대 ${parts[1]}명` };
    }
    return { name, capacity: `${cap}명` };
}

function getCostKey() {
    return `${selectedSeason === 'low' ? 'low' : selectedSeason === 'semi' ? 'semi' : 'high'}_${selectedDay === 'weekday' ? 'wd' : 'we'}`;
}

function getMarketPrice(idx) {
    const key = `${idx}_${getCostKey()}`;
    if (customMarket[key] !== undefined) return customMarket[key];
    return accommodations[idx].market[getCostKey()];
}

function getQuotePrice(idx, discountPct) {
    const market = getMarketPrice(idx);
    const cost = accommodations[idx].cost[getCostKey()];
    if (!market || !cost) return null;
    let quote = Math.round(market * (1 - discountPct / 100));
    // 마진 5% 이상 보장
    const minQuote = Math.ceil(cost / 0.95);
    if (quote < minQuote) quote = minQuote;
    return Math.ceil(quote / 100) * 100;
}

function getMarginPct(idx, discountPct) {
    const cost = accommodations[idx].cost[getCostKey()];
    const quote = getQuotePrice(idx, discountPct);
    if (!cost || !quote) return 0;
    return ((quote - cost) / quote * 100).toFixed(1);
}

function goToStep(step) {
    if (step === 2 && !selectedRegion) { alert('지역을 먼저 선택해주세요.'); return; }
    currentStep = step;
    document.querySelectorAll('.step').forEach(s => {
        const sn = parseInt(s.dataset.step);
        s.classList.toggle('active', sn === step);
        s.classList.toggle('completed', sn < step);
    });
    document.querySelectorAll('.panel').forEach((p, i) => p.classList.toggle('active', i + 1 === step));
    if (step === 2) renderAccomTable();
    if (step === 3) renderOptions();
    if (step === 4) renderQuote();
}

function renderAccomTable() {
    const discount = parseInt(document.getElementById('discountSlider').value);
    const costKey = getCostKey();
    const filtered = accommodations.map((a, i) => ({...a, globalIdx: i})).filter(a => a.region === selectedRegion);

    if (!filtered.length) { document.getElementById('accomTableWrap').innerHTML = '<div class="empty-msg">선택한 지역에 숙소가 없습니다.</div>'; return; }

    let html = `<table class="accom-table" id="accomTable"><thead><tr>
        <th class="check-col"></th><th>숙소</th><th>룸타입</th><th>룸수</th><th>수량</th>
        <th>수용인원</th><th class="price">시중가 (편집가능)</th><th class="price">할인가 (${discount}%)</th>
        <th class="margin-col price">원가</th><th class="margin-col price">마진율</th>
    </tr></thead><tbody>`;

    filtered.forEach(a => {
        const idx = a.globalIdx;
        const cost = a.cost[costKey];
        if (!cost) {
            const pi = parseRoom(a.room);
            html += `<tr style="opacity:0.4"><td class="check-col"><input type="checkbox" disabled></td>
                <td>${a.name}</td><td>${pi.name}</td><td>${a.rooms||'-'}</td><td>-</td>
                <td>${pi.capacity}</td><td class="price">-</td><td class="price">-</td>
                <td class="margin-col price">-</td><td class="margin-col price">-</td></tr>`;
            return;
        }
        const market = getMarketPrice(idx);
        const quote = getQuotePrice(idx, discount);
        const margin = getMarginPct(idx, discount);
        const isSelected = selectedAccom.find(s => s.index === idx);
        const qty = isSelected ? isSelected.qty : 1;
        const marginWarn = parseFloat(margin) < 5;

        const parsed = parseRoom(a.room);
        html += `<tr>
            <td class="check-col"><input type="checkbox" ${isSelected ? 'checked' : ''} onchange="toggleAccom(${idx}, this.checked)"></td>
            <td><strong>${a.name}</strong><br><small style="color:#6b7280">${a.subregion}</small></td>
            <td>${parsed.name}</td>
            <td>${a.rooms || '-'}</td>
            <td><input type="number" class="qty-input" value="${qty}" min="1" max="${a.rooms || 99}" data-idx="${idx}" onchange="updateQty(${idx}, this.value)"></td>
            <td style="font-size:12px;color:#6b7280;white-space:nowrap;">${parsed.capacity}</td>
            <td class="price"><input type="number" class="market-input ${marginWarn?'warn':''}" value="${market}" data-idx="${idx}" onchange="updateMarket(${idx}, this.value)" title="시중가를 직접 수정하세요">원</td>
            <td class="price"><span class="quote-price">${quote.toLocaleString()}원</span> <span class="discount-badge">${discount}%</span></td>
            <td class="margin-col price">${cost.toLocaleString()}원</td>
            <td class="margin-col price"><span class="${marginWarn ? 'margin-warn' : 'margin-ok'}">${margin}% ${marginWarn?'!!':''}</span></td>
        </tr>`;
    });

    html += '</tbody></table>';
    document.getElementById('accomTableWrap').innerHTML = html;
    if (showMargin) document.getElementById('accomTable').classList.add('show-margin');
    renderSelectedAccom();
}

function updateMarket(idx, val) {
    const key = `${idx}_${getCostKey()}`;
    customMarket[key] = parseInt(val) || 0;
    localStorage.setItem('customMarket', JSON.stringify(customMarket));
    renderAccomTable();
}

function toggleAccom(idx, checked) {
    if (checked) {
        const a = accommodations[idx];
        const discount = parseInt(document.getElementById('discountSlider').value);
        const qtyInput = document.querySelector(`input.qty-input[data-idx="${idx}"]`);
        const qty = qtyInput ? parseInt(qtyInput.value) : 1;
        selectedAccom.push({ index: idx, qty });
    } else {
        selectedAccom = selectedAccom.filter(s => s.index !== idx);
    }
    renderSelectedAccom();
}

function updateQty(idx, val) {
    const item = selectedAccom.find(s => s.index === idx);
    if (item) item.qty = parseInt(val) || 1;
    renderSelectedAccom();
}

function removeAccom(idx) { selectedAccom = selectedAccom.filter(s => s.index !== idx); renderAccomTable(); }

function renderSelectedAccom() {
    const wrap = document.getElementById('selectedAccomItems');
    const discount = parseInt(document.getElementById('discountSlider').value);
    if (!selectedAccom.length) { wrap.innerHTML = '<div style="color:#9ca3af;font-size:13px;padding:8px;">숙소를 선택해주세요</div>'; return; }
    wrap.innerHTML = selectedAccom.map(s => {
        const a = accommodations[s.index];
        const quote = getQuotePrice(s.index, discount);
        return `<div class="selected-item"><span>${a.name} - ${a.room} x ${s.qty}실</span>
            <span>${(quote * s.qty).toLocaleString()}원/박 <span class="remove" onclick="removeAccom(${s.index})">X</span></span></div>`;
    }).join('');
}

function updateDiscount() {
    document.getElementById('discountValue').textContent = document.getElementById('discountSlider').value + '%';
    renderAccomTable();
}

function selectSeason(s) {
    selectedSeason = s;
    document.querySelectorAll('.season-tab').forEach(t => t.classList.toggle('active', t.dataset.season === s));
    renderAccomTable();
}

function selectDay(d) {
    selectedDay = d;
    document.querySelectorAll('.day-tab').forEach(t => t.classList.toggle('active', t.dataset.day === d));
    renderAccomTable();
}

// Options
function formatPricing(pricing) {
    return pricing.map(p => p.unit > 0 ? `${p.label} ${p.unit.toLocaleString()}원` : `${p.label} 문의`).join(' / ');
}

function getMatchedOptions() {
    let matched = [];
    for (const key in options) {
        if (key.startsWith(selectedRegion) || accommodations.filter(a => a.region === selectedRegion).some(a => key.includes(a.subregion.replace('시','').replace('군','')))) {
            matched = matched.concat(options[key].map(o => ({...o, groupKey: key})));
        }
    }
    if (!matched.length && selectedRegion) {
        const subs = [...new Set(accommodations.filter(a => a.region === selectedRegion).map(a => a.subregion))];
        for (const key in options) for (const sub of subs) if (key.includes(sub.replace('시','').replace('군',''))) matched = matched.concat(options[key].map(o => ({...o, groupKey: key})));
    }
    const seen = new Set();
    return matched.filter(o => { const k = o.name; if (seen.has(k)) return false; seen.add(k); return true; });
}

function renderOptions() {
    const wrap = document.getElementById('optionContent');
    const matched = getMatchedOptions();
    if (!matched.length) { wrap.innerHTML = '<div class="empty-msg">선택한 지역에 추가 옵션이 없습니다.</div>'; return; }
    wrap.innerHTML = '<div class="option-grid">' + matched.map((o, i) => {
        const sel = selectedOptions.find(s => s.name === o.name);
        return `<div class="option-card ${sel?'selected':''}" onclick="toggleOption(${i}, this)" data-oidx="${i}">
            <h4>${o.name}</h4><div class="option-price">${formatPricing(o.pricing)}</div>
            ${o.desc ? `<div class="option-tag">${o.desc}</div>` : ''}
            <div class="option-age">${o.ages||''} ${o.tag?'| '+o.tag:''}</div></div>`;
    }).join('') + '</div>';
    wrap._options = matched;
    renderSelectedOptions();
}

function toggleOption(idx, el) {
    const matched = getMatchedOptions();
    const o = matched[idx];
    const ex = selectedOptions.findIndex(s => s.name === o.name);
    if (ex >= 0) {
        selectedOptions.splice(ex, 1);
        el.classList.remove('selected');
    } else {
        // 각 pricing 항목에 대해 수량 0으로 초기화
        const qtys = o.pricing.map(p => ({ label: p.label, unit: p.unit, qty: 0 }));
        selectedOptions.push({ name: o.name, pricing: o.pricing, qtys, isFixed: o.isFixed || false });
        el.classList.add('selected');
    }
    renderSelectedOptions();
}

function removeOption(name) { selectedOptions = selectedOptions.filter(o => o.name !== name); renderOptions(); }

function updateOptionQty(optName, pricingIdx, val) {
    const opt = selectedOptions.find(o => o.name === optName);
    if (opt) { opt.qtys[pricingIdx].qty = parseInt(val) || 0; }
    renderSelectedOptions();
}

function calcOptionSubtotal(opt) {
    if (opt.isFixed) return opt.qtys[0].unit * (opt.qtys[0].qty || 1);
    return opt.qtys.reduce((sum, q) => sum + (q.unit > 0 ? q.unit * q.qty : 0), 0);
}

function renderSelectedOptions() {
    const wrap = document.getElementById('selectedOptionItems');
    if (!selectedOptions.length) { wrap.innerHTML = '<div style="color:#9ca3af;font-size:13px;padding:8px;">옵션을 선택해주세요 (선택사항)</div>'; return; }
    wrap.innerHTML = selectedOptions.map(o => {
        const subtotal = calcOptionSubtotal(o);
        const qtyInputs = o.qtys.map((q, pi) => {
            if (q.unit === 0) return `<span style="font-size:12px;color:#9ca3af;">${q.label}: 문의</span>`;
            return `<label style="font-size:12px;margin-right:12px;">${q.label}(${q.unit.toLocaleString()}원) x
                <input type="number" class="qty-input" value="${q.qty}" min="0" style="width:50px;font-size:12px;padding:2px 4px;"
                onchange="updateOptionQty('${o.name}', ${pi}, this.value)">명</label>`;
        }).join(' ');
        return `<div class="selected-item" style="flex-wrap:wrap;gap:8px;">
            <div style="width:100%;display:flex;justify-content:space-between;align-items:center;">
                <strong>${o.name}</strong>
                <span class="remove" onclick="removeOption('${o.name}')">X</span>
            </div>
            <div style="width:100%;display:flex;flex-wrap:wrap;align-items:center;gap:4px;">
                ${qtyInputs}
                ${subtotal > 0 ? `<span style="margin-left:auto;font-weight:600;color:#2d5aa0;">= ${subtotal.toLocaleString()}원</span>` : ''}
            </div>
        </div>`;
    }).join('');
}

            <span class="amount">합계금액: &#8361; ${grandTotal.toLocaleString()} (VAT 포함)</span>
        </div>

        <div class="quote-info-grid" style="margin-bottom:20px;">
            <div class="quote-info-item"><dt>인원</dt><dd>${numPeople}명</dd></div>
            <div class="quote-info-item"><dt>일정</dt><dd>${tripDate} (${numNights}박)</dd></div>
            <div class="quote-info-item"><dt>목적</dt><dd>${purpose}</dd></div>
            <div class="quote-info-item"><dt>지역</dt><dd>${regionLabels[selectedRegion]||selectedRegion} (${seasonLabel} ${dayLabel})</dd></div>
        </div>
        <h3 style="margin:20px 0 10px;font-size:16px;">숙소</h3>
        <table class="quote-table"><thead><tr><th>숙소</th><th>룸타입</th><th style="text-align:center">수용인원</th><th style="text-align:center">수량</th><th style="text-align:center">박수</th><th style="text-align:right">단가</th><th style="text-align:right">소계</th></tr></thead><tbody>
            ${accomRows || '<tr><td colspan="6" style="text-align:center;color:#9ca3af;">선택된 숙소가 없습니다</td></tr>'}
            <tr class="subtotal"><td colspan="6" style="text-align:right;">숙소 소계</td><td style="text-align:right;">${accomTotal.toLocaleString()}원</td></tr>
        </tbody></table>
        ${selectedOptions.length ? `<h3 style="margin:20px 0 10px;font-size:16px;">추가 옵션 (인당 가격)</h3>
        <table class="quote-table"><thead><tr><th>항목</th><th colspan="4">내역</th><th colspan="2" style="text-align:right">소계</th></tr></thead><tbody>
            ${optionRows}
            <tr class="subtotal"><td colspan="5" style="text-align:right;">옵션 소계</td><td style="text-align:right;" colspan="2">${optionTotal > 0 ? optionTotal.toLocaleString() + '원' : '-'}</td></tr>
        </tbody></table>` : ''}
        <div class="quote-total">
            <div class="total-label">합계 금액</div>
            <div class="total-amount">${grandTotal.toLocaleString()}원</div>
            <div class="discount-info">시중가 대비 ${discount}% 할인 적용</div>
            ${optionTotal > 0 ? `<div style="font-size:12px;color:#6b7280;margin-top:2px;">숙소 ${accomTotal.toLocaleString()}원 + 옵션 ${optionTotal.toLocaleString()}원</div>` : ''}
            ${selectedOptions.some(o => o.qtys.some(q => q.unit === 0)) ? '<div style="font-size:12px;color:#ef4444;margin-top:4px;">* 일부 옵션은 가격 별도 문의</div>' : ''}
        </div>
        <div class="quote-note"><strong>안내사항</strong><br>
            - 본 견적서는 발행일로부터 7일간 유효합니다.<br>
            - 숙소 가격은 ${seasonLabel} ${dayLabel} 기준이며, 시즌 및 요일에 따라 변동될 수 있습니다.<br>
            - 추가 옵션 비용은 인원수 및 세부 사항에 따라 변동될 수 있습니다.<br>
            - 예약 확정 시 별도 계약서를 통해 최종 금액이 확정됩니다.<br>
            - VAT 포함</div>

        `;
}

function toggleMargin() {
    showMargin = !showMargin;
    const table = document.getElementById('accomTable');
    if (table) table.classList.toggle('show-margin', showMargin);
    document.querySelector('.admin-toggle').textContent = showMargin ? '마진 숨기기' : '마진 확인';
}

init();
</script>
</body>
</html>
